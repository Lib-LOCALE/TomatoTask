<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bar {
        fill: #6366f1;
      }
      .bar-accent {
        fill: #8b5cf6;
      }
      .trend-line {
        fill: none;
        stroke: #10b981;
        stroke-width: 2;
        stroke-linecap: round;
      }
      .dot {
        fill: #10b981;
      }

      @keyframes grow-bar-1 {
        0% { height: 0; y: 52; }
        100% { height: 16; y: 36; }
      }

      @keyframes grow-bar-2 {
        0% { height: 0; y: 52; }
        100% { height: 28; y: 24; }
      }

      @keyframes grow-bar-3 {
        0% { height: 0; y: 52; }
        100% { height: 40; y: 12; }
      }

      @keyframes draw-line {
        0% {
          stroke-dasharray: 0, 100;
        }
        100% {
          stroke-dasharray: 100, 100;
        }
      }

      @keyframes pop-dot {
        0% {
          transform: scale(0);
          opacity: 0;
        }
        50% {
          transform: scale(1.3);
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }

      .bar-1 {
        animation: grow-bar-1 0.6s ease-out forwards;
      }

      .bar-2 {
        animation: grow-bar-2 0.6s 0.2s ease-out forwards;
      }

      .bar-3 {
        animation: grow-bar-3 0.6s 0.4s ease-out forwards;
      }

      .trend-line {
        animation: draw-line 1s 0.6s ease-out forwards;
        stroke-dasharray: 0, 100;
      }

      .dot {
        animation: pop-dot 0.3s ease-out forwards;
        transform-origin: center;
      }

      .dot:nth-child(2) {
        animation-delay: 0.8s;
      }

      .dot:nth-child(3) {
        animation-delay: 1s;
      }

      .dot:nth-child(4) {
        animation-delay: 1.2s;
      }

      /* Continuous pulse on hover */
      @keyframes pulse-bars {
        0%, 100% {
          transform: scaleY(1);
        }
        50% {
          transform: scaleY(1.1);
        }
      }

      svg:hover .bar {
        animation: pulse-bars 1s ease-in-out infinite !important;
        transform-origin: bottom;
      }
    </style>
  </defs>

  <!-- Background grid -->
  <line x1="8" y1="52" x2="56" y2="52" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="8" y1="38" x2="56" y2="38" stroke="#e5e7eb" stroke-width="1" opacity="0.5"/>
  <line x1="8" y1="24" x2="56" y2="24" stroke="#e5e7eb" stroke-width="1" opacity="0.5"/>
  <line x1="8" y1="10" x2="56" y2="10" stroke="#e5e7eb" stroke-width="1" opacity="0.5"/>

  <!-- Animated bars -->
  <rect x="12" y="52" width="8" height="0" rx="2" class="bar bar-1"/>
  <rect x="24" y="52" width="8" height="0" rx="2" class="bar-accent bar-2"/>
  <rect x="36" y="52" width="8" height="0" rx="2" class="bar bar-3"/>

  <!-- Trend line -->
  <path d="M 12 48 L 24 32 L 36 20 L 48 12" class="trend-line"/>

  <!-- Dots on trend line -->
  <circle cx="12" cy="48" r="3" class="dot" opacity="0"/>
  <circle cx="24" cy="32" r="3" class="dot" opacity="0"/>
  <circle cx="36" cy="20" r="3" class="dot" opacity="0"/>
  <circle cx="48" cy="12" r="3" class="dot" opacity="0"/>

  <!-- Up arrow -->
  <path d="M 52 16 L 56 20 M 52 16 L 48 20 M 52 8 L 52 16" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
</svg>
