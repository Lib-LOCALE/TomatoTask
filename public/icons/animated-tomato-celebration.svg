<svg width="512" height="512" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .stem { fill: #4CAF50; }
      .stem-dark { fill: #2E7D32; }
      .body { fill: #F44336; }
      .body-dark { fill: #C62828; }
      .body-light { fill: #FFCDD2; }
      .shadow { fill: #B71C1C; }
      .star { fill: #FFD700; }
      .confetti-red { fill: #F44336; }
      .confetti-blue { fill: #2196F3; }
      .confetti-green { fill: #4CAF50; }
      .confetti-yellow { fill: #FFEB3B; }

      /* Animations */
      @keyframes celebrate-bounce {
        0%, 100% { transform: translateY(0px) scale(1); }
        10% { transform: translateY(-10px) scale(1.1); }
        20% { transform: translateY(0px) scale(1); }
        30% { transform: translateY(-6px) scale(1.05); }
        40% { transform: translateY(0px) scale(1); }
      }

      @keyframes star-twinkle {
        0%, 100% { opacity: 1; transform: scale(1) rotate(0deg); }
        50% { opacity: 0.5; transform: scale(1.3) rotate(180deg); }
      }

      @keyframes confetti-fall-left {
        0% { transform: translateY(-20px) translateX(0px) rotate(0deg); opacity: 1; }
        100% { transform: translateY(30px) translateX(-15px) rotate(-180deg); opacity: 0; }
      }

      @keyframes confetti-fall-right {
        0% { transform: translateY(-20px) translateX(0px) rotate(0deg); opacity: 1; }
        100% { transform: translateY(30px) translateX(15px) rotate(180deg); opacity: 0; }
      }

      @keyframes happy-wiggle {
        0%, 100% { transform: rotate(0deg); }
        25% { transform: rotate(-5deg); }
        75% { transform: rotate(5deg); }
      }

      .tomato-group {
        animation: celebrate-bounce 2s ease-in-out infinite;
        transform-origin: center center;
      }

      .stem-group {
        animation: happy-wiggle 1s ease-in-out infinite;
        transform-origin: 10px 4px;
      }

      .star {
        animation: star-twinkle 1.5s ease-in-out infinite;
      }

      .confetti-1 { animation: confetti-fall-left 2s ease-in-out infinite; }
      .confetti-2 { animation: confetti-fall-right 2.2s ease-in-out infinite 0.3s; }
      .confetti-3 { animation: confetti-fall-left 2.4s ease-in-out infinite 0.6s; }
      .confetti-4 { animation: confetti-fall-right 2.1s ease-in-out infinite 0.9s; }
    </style>
  </defs>

  <!-- Confetti particles -->
  <g class="confetti-1">
    <rect x="5" y="1" width="1" height="2" class="confetti-red" />
  </g>
  <g class="confetti-2">
    <rect x="14" y="1" width="1" height="2" class="confetti-blue" />
  </g>
  <g class="confetti-3">
    <rect x="3" y="2" width="2" height="1" class="confetti-yellow" />
  </g>
  <g class="confetti-4">
    <rect x="15" y="2" width="2" height="1" class="confetti-green" />
  </g>

  <!-- Tomato with stem -->
  <g class="tomato-group">
    <!-- Stem -->
    <g class="stem-group">
      <rect x="9" y="2" width="2" height="1" class="stem" />
      <rect x="8" y="3" width="4" height="1" class="stem" />
      <rect x="7" y="4" width="6" height="1" class="stem" />
      <rect x="9" y="4" width="2" height="1" class="stem-dark" />
    </g>

    <!-- Body -->
    <rect x="6" y="5" width="8" height="1" class="body" />
    <rect x="5" y="6" width="10" height="1" class="body" />
    <rect x="4" y="7" width="12" height="1" class="body" />
    <rect x="3" y="8" width="14" height="6" class="body" />
    <rect x="4" y="14" width="12" height="1" class="body" />
    <rect x="5" y="15" width="10" height="1" class="body" />
    <rect x="6" y="16" width="8" height="1" class="body" />

    <!-- Shine -->
    <rect x="5" y="7" width="2" height="1" class="body-light" />
    <rect x="4" y="8" width="1" height="2" class="body-light" />
    <rect x="5" y="8" width="1" height="1" class="body-light" />

    <!-- Shadow -->
    <rect x="12" y="14" width="4" height="1" class="shadow" />
    <rect x="10" y="15" width="5" height="1" class="shadow" />
    <rect x="8" y="16" width="4" height="1" class="shadow" />
  </g>

  <!-- Stars around tomato -->
  <g class="star" style="animation-delay: 0s;">
    <rect x="1" y="8" width="1" height="1" class="star" />
    <rect x="2" y="9" width="1" height="1" class="star" />
    <rect x="0" y="9" width="1" height="1" class="star" />
  </g>
  <g class="star" style="animation-delay: 0.5s;">
    <rect x="18" y="10" width="1" height="1" class="star" />
    <rect x="19" y="11" width="1" height="1" class="star" />
    <rect x="17" y="11" width="1" height="1" class="star" />
  </g>
  <g class="star" style="animation-delay: 1s;">
    <rect x="2" y="14" width="1" height="1" class="star" />
    <rect x="1" y="15" width="1" height="1" class="star" />
  </g>
  <g class="star" style="animation-delay: 0.7s;">
    <rect x="17" y="6" width="1" height="1" class="star" />
    <rect x="18" y="7" width="1" height="1" class="star" />
  </g>
</svg>
