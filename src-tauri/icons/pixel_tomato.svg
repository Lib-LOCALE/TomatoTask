<svg width="512" height="512" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <!-- Palette -->
  <defs>
    <style>
      .stem { fill: #4CAF50; }
      .stem-dark { fill: #2E7D32; }
      .body { fill: #F44336; }
      .body-dark { fill: #C62828; }
      .body-light { fill: #FFCDD2; }
      .shadow { fill: #B71C1C; }
    </style>
  </defs>

  <!-- Stem -->
  <rect x="7" y="0" width="2" height="1" class="stem" />
  <rect x="6" y="1" width="4" height="1" class="stem" />
  <rect x="5" y="2" width="6" height="1" class="stem" />
  <rect x="7" y="2" width="2" height="1" class="stem-dark" /> <!-- Stem shadow -->

  <!-- Body Main -->
  <rect x="4" y="3" width="8" height="1" class="body" />
  <rect x="3" y="4" width="10" height="1" class="body" />
  <rect x="2" y="5" width="12" height="1" class="body" />
  <rect x="1" y="6" width="14" height="6" class="body" />
  <rect x="2" y="12" width="12" height="1" class="body" />
  <rect x="3" y="13" width="10" height="1" class="body" />
  <rect x="4" y="14" width="8" height="1" class="body" />

  <!-- Shine (Top Left) -->
  <rect x="3" y="5" width="2" height="1" class="body-light" />
  <rect x="2" y="6" width="1" height="2" class="body-light" />
  <rect x="3" y="6" width="1" height="1" class="body-light" />

  <!-- Shadow (Bottom Right) -->
  <rect x="10" y="12" width="4" height="1" class="shadow" />
  <rect x="8" y="13" width="5" height="1" class="shadow" />
  <rect x="6" y="14" width="4" height="1" class="shadow" />
  
  <!-- Subtle gradient/shading lines -->
  <rect x="1" y="9" width="1" height="2" class="body-dark" />
  <rect x="14" y="9" width="1" height="2" class="body-dark" />

</svg>
